<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Secure Auth System</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Dynamic Background Orbs -->
  <div class="bg-orb-extra"></div>

  <!-- Floating Glassmorphic Shapes -->
  <div class="glass-shape shape-1"></div>
  <div class="glass-shape shape-2"></div>
  <div class="glass-shape shape-3"></div>
  <div class="glass-shape shape-4"></div>

  <!-- Verification Screen Loader -->
  <div id="page-loader" class="loader-overlay">
    <div class="spinner"></div>
  </div>

  <div class="dashboard-wrapper">
    <div class="glass-card">
      
      <!-- Dashboard Header -->
      <header class="dashboard-header">
        <div class="dashboard-brand">
          <h2>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            SecureDashboard
          </h2>
        </div>
        <div class="user-profile-badge">
          <div class="user-avatar" id="avatar-circle">?</div>
          <div class="user-info">
            <span class="user-display-name" id="user-display-name">Username</span>
            <span class="user-role-tag">Session Authorized</span>
          </div>
        </div>
      </header>

      <!-- Dashboard Grid -->
      <main class="dashboard-grid">
        <!-- Left: Profile Details -->
        <section class="info-card">
          <h3>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            Account Credentials
          </h3>
          <div class="profile-details">
            <div class="detail-row">
              <span class="detail-label">User Database ID</span>
              <span class="detail-value" id="detail-id">-</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Username</span>
              <span class="detail-value" id="detail-username">-</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Email Address</span>
              <span class="detail-value" id="detail-email">-</span>
            </div>
          </div>
        </section>

        <!-- Right: Session Security Status -->
        <section class="info-card security-status-card">
          <h3>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
            Security & Session
          </h3>
          <div class="profile-details">
            <div class="detail-row">
              <span class="detail-label">Session Status</span>
              <span class="detail-value">
                <span class="status-badge status-active">
                  <span class="pulse-dot"></span> Active
                </span>
              </span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Token Type</span>
              <span class="detail-value">HttpOnly JWT</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">CORS/CSRF Protection</span>
              <span class="detail-value" style="color: var(--color-success); font-weight: 600;">SameSite=Strict</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Client Browser</span>
              <span class="detail-value" id="detail-browser" style="max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">-</span>
            </div>
          </div>
        </section>
      </main>

      <!-- Logout Container -->
      <footer class="logout-container">
        <button id="logout-btn" class="btn btn-danger">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Logout Session
        </button>
      </footer>

    </div>
  </div>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
