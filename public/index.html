<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifying Session - Secure Auth</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Centered Glass Loading Spinner -->
  <div class="loader-overlay">
    <div style="text-align: center;">
      <div class="spinner" style="margin: 0 auto 16px;"></div>
      <p style="font-family: var(--font-heading); color: var(--text-muted); font-size: 14px; letter-spacing: 0.05em; text-transform: uppercase;">Authenticating Session...</p>
    </div>
  </div>

  <script>
    // Run session check on initial visit
    fetch('/api/auth/me')
      .then(response => {
        if (response.ok) {
          window.location.replace('dashboard.html');
        } else {
          window.location.replace('login.html');
        }
      })
      .catch(() => {
        window.location.replace('login.html');
      });
  </script>
</body>
</html>
